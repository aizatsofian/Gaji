<script type="text/babel">
    function AccountView({ user, role, email }) {
      const [oldPassword, setOldPassword] = useState('');
      const [newPassword, setNewPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [currentEmail, setCurrentEmail] = useState(email || '');

      useEffect(() => {
        // If email is already provided from login, use it
        if (email) {
          setCurrentEmail(email);
          return;
        }
        // Otherwise fetch from server
        google.script.run
          .withSuccessHandler((result) => {
            if (!result) return;
            if (result.success) {
              const userData = result.data.find(u => u.Username === user);
              if (userData) {
                setCurrentEmail(userData.Email);
              }
            }
          })
          .withFailureHandler((err) => {
            console.log('Error loading user data:', err.message);
          })
          .getUsers(user);
      }, [user, email]);

      const handleChangePassword = (e) => {
        e.preventDefault();

        if (newPassword !== confirmPassword) {
          Swal.fire({ icon: 'error', text: 'New passwords do not match' });
          return;
        }

        setLoading(true);
        google.script.run
          .withSuccessHandler((result) => {
            setLoading(false);
            if (!result) {
              Swal.fire({ icon: 'error', text: 'No response from server. Please try again.' });
              return;
            }
            if (result.success) {
              Swal.fire({ icon: 'success', text: result.message, timer: 2000 });
              setOldPassword('');
              setNewPassword('');
              setConfirmPassword('');
            } else {
              Swal.fire({ icon: 'error', text: result.message });
            }
          })
          .withFailureHandler((err) => {
            setLoading(false);
            Swal.fire({ icon: 'error', text: err.message });
          })
          .changePassword(currentEmail, oldPassword, newPassword);
      };

      return (
        <div className="data-section">
          <div className="section-header">
            <h2>
              <i className="fas fa-user-circle"></i> My Account
            </h2>
          </div>
          <div style={{ maxWidth: '600px' }}>
            <div style={{ background: '#f8f9fa', padding: '20px', borderRadius: '4px', marginBottom: '30px' }}>
              <h3 style={{ fontSize: '16px', marginBottom: '15px', color: '#333' }}>Account Information</h3>
              <div style={{ marginBottom: '10px' }}>
                <strong>Username:</strong> {user}
              </div>
              <div style={{ marginBottom: '10px' }}>
                <strong>Email:</strong> {currentEmail}
              </div>
              <div>
                <strong>Role:</strong> <span className={`status-badge ${role === 'Admin' ? 'status-active' : 'status-pending'}`}>{role}</span>
              </div>
            </div>

            <h3 style={{ fontSize: '18px', marginBottom: '20px', color: '#333' }}>Change Password</h3>
            <form onSubmit={handleChangePassword}>
              <div className="form-group">
                <label>Current Password *</label>
                <input
                  type="password"
                  value={oldPassword}
                  onChange={(e) => setOldPassword(e.target.value)}
                  required
                />
              </div>
              <div className="form-group">
                <label>New Password *</label>
                <input
                  type="password"
                  value={newPassword}
                  onChange={(e) => setNewPassword(e.target.value)}
                  required
                />
              </div>
              <div className="form-group">
                <label>Confirm New Password *</label>
                <input
                  type="password"
                  value={confirmPassword}
                  onChange={(e) => setConfirmPassword(e.target.value)}
                  required
                />
              </div>
              <button type="submit" className="btn btn-primary" disabled={loading}>
                {loading ? (
                  <>
                    <i className="fas fa-spinner fa-spin"></i> Updating...
                  </>
                ) : (
                  <>
                    <i className="fas fa-key"></i> Change Password
                  </>
                )}
              </button>
            </form>
          </div>
        </div>
      );
    }
</script>
